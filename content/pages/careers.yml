sections:
  - type: careers_intro
    enabled: true
    intro_headline: Join Our Team
    intro_body: If you are looking for a challenging position in a positive
      environment Pellicano may be the place for you. We believe you should have
      many opportunities to advance in your career. We offer the latest
      technologies and industry advances to every employee. We want energetic
      employees who lead by example and who are willing to go the extra mile to
      ensure that the owner's needs are met. We instill a sense of family and
      are always available to all employees.
    training_headline: Training
    training_body: Ongoing training is part of our culture. We utilize both internal
      training methods and external training through various organizations to
      help develop each employee. It is important to us that you fully
      understand your role whether in the field or in the office. From new
      technologies to jobsite procedures, we want you to be very familiar with
      all tools that are available to you. We believe that learning never ceases
      and the better trained you are the more you will enjoy your job.
    people_headline: People
    people_body: Construction techniques continue to change but business principles
      stay the same. We are always looking for energetic, positive people to
      join our team. Our goal is that you invest in us and we invest in you. We
      want our success to be your success. All team members are important and
      should feel a sense of pride in their contributions and in the company.
