summary: A local restaurant build-out shaped through a design-build approach,
  upgraded MEP systems, and refined life-safety improvements.
description: Starting from a simple retail shell, Pellicano worked with the
  owners to realize the vision for Bianca's. Mechanical, electrical, and
  plumbing systems were upgraded to support new kitchen and bar equipment, while
  acoustical, insulation, and life-safety performance were improved throughout
  the space.
