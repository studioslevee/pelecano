summary: A 15,837-square-foot entertainment venue with bowling lanes, bars,
  restaurant space, and a covered patio.
description: Bowl & Barrel transformed a warehouse-style shell into an
  entertainment destination with 15 bowling lanes, two bars, a restaurant, and a
  1,713-square-foot covered patio. The interior combines exposed trusses,
  whitewashed brick, reclaimed barn wood, custom steel features, and a mix of
  tile, wood, carpet, and exposed slab flooring.
