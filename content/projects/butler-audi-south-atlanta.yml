summary: A three-story, 55,121-square-foot luxury dealership delivered through a
  design-build contract for Butler Automotive Group.
description: Pellicano served as General Contractor on a design-build contract
  for the Audi South Atlanta project in Union City, Georgia. The structural
  steel and concrete facility supports sales, service, and administration and
  includes 331 parking spaces, with 86 spaces on a second-story deck above the
  service area.
