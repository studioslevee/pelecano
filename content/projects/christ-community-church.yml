summary: A 12,760-square-foot worship center with sanctuary, classrooms,
  hospitality areas, and exterior site improvements.
description: Christ Community Church Worship Center in Cumming, Georgia features
  a structural steel frame with stucco and stone veneer finishes. The facility
  includes a 450-seat sanctuary, new audio/visual systems, children's spaces,
  café, pastor's study, green room, hospitality area, parking improvements, and
  a rear loading dock.
