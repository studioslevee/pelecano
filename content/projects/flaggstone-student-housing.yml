summary: A 30,000-square-foot residential community for medical students,
  physicians, and pharmacy students in Southwest Georgia.
description: Flaggstone includes 26 units and 40 beds across studio,
  one-bedroom, two-bedroom, and three-bedroom layouts. The property also
  includes common areas, coffee bar, study spaces, meeting rooms, and outdoor
  gathering areas with a fireplace and grill.
