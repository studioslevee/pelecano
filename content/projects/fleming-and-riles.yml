summary: A 7,230-square-foot office building with unfinished second-floor
  expansion space and detailed interior finishes.
description: The wood-framed office building includes 25 offices, a large
  conference room, business hub, break room, restrooms, and select interior
  perimeter windows. Interior finishes combine plastic laminate and stained wood
  casework, painted walls, crown and chair rail details, luxury vinyl plank,
  vinyl composite tile, and carpet squares.
