summary: A chapel and overlook terrace showcasing highly detailed craftsmanship,
  stonework, and custom wood features.
description: Free Chapel combines exceptional finish detail with custom
  stonework, grand entry doors, cypress trim, and a terrace overlooking an
  outdoor amphitheater. The project includes a gazebo, reflection pond
  adjacency, and fire features that extend the experience beyond the chapel
  interior.
