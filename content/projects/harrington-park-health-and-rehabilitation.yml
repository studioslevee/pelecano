summary: A 43,855-square-foot skilled nursing facility with patient beds,
  therapy areas, kitchen support, and rehabilitation amenities.
description: Harrington Park Health & Rehabilitation is a two-story steel-framed
  facility built on a 7.26-acre site. The project includes 58 beds, therapy
  spaces, a therapy pool, commercial kitchen support, and a
  brick-and-cement-siding exterior.
