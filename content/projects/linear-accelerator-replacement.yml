summary: Design-build modifications to existing hospital linear accelerator
  vaults in an active radiation oncology environment.
description: This project included equipment removal and installation,
  demolition of existing cast-in-place concrete and steel framing, new equipment
  support framing, concrete foundations, and upgrades to chilled water, medical
  gas, and electrical systems. Infection control was critical throughout
  construction in the operating hospital environment.
