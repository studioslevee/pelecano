description: Renovations to the seventh floor of the T Wing created 10 private
  COVID ICU rooms, each with duplicate med-gas connections, private toilet
  rooms, and family seating. The suite also includes a high-efficiency HVAC
  system, nurse's station, med room, clean supply, soiled utility, and offices.
