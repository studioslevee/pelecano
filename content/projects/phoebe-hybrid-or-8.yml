summary: Phoebe Putney Memorial Hospital's first hybrid operating room,
  combining surgical infrastructure with advanced imaging technology.
description: OR 8 integrates traditional operating room systems with ceiling
  rail-mounted Philips imaging equipment, Stryker booms, a shielded control
  room, and a separate equipment room. The space was designed to support
  advanced image-guided procedures in a hospital setting.
