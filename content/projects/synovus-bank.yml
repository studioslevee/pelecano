summary: A 7,000-square-foot interior demolition and renovation for a new
  state-of-the-art main branch.
description: Pellicano renovated Synovus Bank's branch to deliver nine new
  private banking offices, a large open lobby with teller stations, a conference
  room, an updated vault, a breakroom, and a flexible training room. The project
  also upgraded the drive-through area to support remote transactions with
  personal bankers.
